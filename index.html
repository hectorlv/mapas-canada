<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extraordinario Este Canadiense — Itinerario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8CC80;
    --dark: #0D0F14;
    --panel: #13151C;
    --panel2: #1A1D28;
    --border: rgba(201,168,76,0.2);
    --text: #E8E4DA;
    --muted: #7A7669;
    --maple: #C0392B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* SIDEBAR */
  #sidebar {
    width: 340px;
    min-width: 340px;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
    z-index: 1000;
  }

  #sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel2);
  }

  .flag-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .maple-leaf {
    width: 18px;
    height: 18px;
    fill: var(--maple);
  }

  .route-tag {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
  }

  #sidebar-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 4px;
  }

  #sidebar-header h1 em {
    color: var(--gold);
    font-style: italic;
  }

  .trip-meta {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-top: 6px;
  }

  /* FILTER TABS */
  #filter-tabs {
    display: flex;
    gap: 4px;
    padding: 10px 12px;
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 10px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--gold);
    color: var(--dark);
    border-color: var(--gold);
    font-weight: 500;
  }

  /* TIMELINE */
  #timeline {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .city-block {
    padding: 0;
    cursor: pointer;
    transition: background 0.15s;
  }

  .city-block:hover { background: rgba(201,168,76,0.05); }
  .city-block.active { background: rgba(201,168,76,0.08); }

  .city-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px 10px;
  }

  .day-badge {
    min-width: 34px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--dark);
    flex-direction: column;
    line-height: 1;
  }

  .day-badge span { font-size: 8px; font-weight: 400; margin-top: 1px; }

  .city-info { flex: 1; }

  .city-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--text);
    line-height: 1.1;
  }

  .city-date {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.3px;
  }

  .transfer-badge {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--gold);
    padding: 3px 8px;
    background: rgba(201,168,76,0.1);
    border-radius: 4px;
    margin: 0 16px 8px;
    width: fit-content;
    margin-left: 62px;
  }

  .spots-list {
    padding: 0 16px 12px 62px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .spot-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    padding: 3px 0;
    transition: color 0.15s;
    cursor: pointer;
  }

  .spot-item:hover { color: var(--text); }

  .spot-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .spot-item.optional { font-style: italic; }
  .spot-item.optional::after {
    content: 'opcional';
    font-size: 9px;
    color: var(--gold);
    margin-left: 4px;
    background: rgba(201,168,76,0.15);
    padding: 1px 5px;
    border-radius: 3px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 16px;
  }

  /* BUS ROUTE SEPARATORS */
  .bus-route {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    background: rgba(201,168,76,0.04);
  }

  .bus-line {
    flex: 1;
    height: 1px;
    background: repeating-linear-gradient(to right, var(--gold) 0, var(--gold) 6px, transparent 6px, transparent 12px);
  }

  .bus-icon {
    font-size: 14px;
  }

  .bus-km {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.5px;
  }

  /* MAP */
  #map-container {
    flex: 1;
    position: relative;
  }

  #map { width: 100%; height: 100%; }

  /* LEGEND */
  #legend {
    position: absolute;
    bottom: 24px;
    right: 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    z-index: 500;
    min-width: 160px;
  }

  #legend h4 {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .legend-line {
    width: 24px;
    height: 2px;
    background: repeating-linear-gradient(to right, var(--gold) 0, var(--gold) 5px, transparent 5px, transparent 9px);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid var(--dark);
  }

  /* TOOLTIP */
  #tooltip {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--gold);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text);
    z-index: 600;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    font-family: 'Playfair Display', serif;
    font-style: italic;
  }

  #tooltip.show { opacity: 1; }

  /* Leaflet overrides */
  .leaflet-popup-content-wrapper {
    background: var(--panel2) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    color: var(--text) !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
  }

  .leaflet-popup-tip { background: var(--panel2) !important; }

  .leaflet-popup-content {
    margin: 12px 14px !important;
    font-family: 'DM Sans', sans-serif !important;
  }

  .popup-city {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .popup-spots { font-size: 11px; color: var(--muted); line-height: 1.7; }
  .popup-spot { display: flex; gap: 6px; align-items: flex-start; }
  .popup-spot::before { content: '→'; color: var(--gold); font-size: 10px; margin-top: 2px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div class="flag-row">
      <svg class="maple-leaf" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 5 L57 35 L90 30 L72 50 L85 85 L50 68 L15 85 L28 50 L10 30 L43 35 Z"/>
      </svg>
      <span class="route-tag">YUL → YYZ · 8 noches</span>
    </div>
    <h1>Este <em>Canadiense</em><br>Extraordinario</h1>
    <div class="trip-meta">31 MAY – 08 JUN 2026 · 4 adultos · $2,399 USD p/p</div>
  </div>

  <div id="filter-tabs">
    <button class="filter-btn active" onclick="filterCity('all')">Todos</button>
    <button class="filter-btn" onclick="filterCity('montreal')">Montréal</button>
    <button class="filter-btn" onclick="filterCity('quebec')">Québec</button>
    <button class="filter-btn" onclick="filterCity('tremblant')">Tremblant</button>
    <button class="filter-btn" onclick="filterCity('ottawa')">Ottawa</button>
    <button class="filter-btn" onclick="filterCity('milislas')">Mil Islas</button>
    <button class="filter-btn" onclick="filterCity('toronto')">Toronto</button>
    <button class="filter-btn" onclick="filterCity('niagara')">Niágara</button>
  </div>

  <div id="timeline"></div>
</div>

<div id="map-container">
  <div id="map"></div>
  <div id="tooltip">Haz clic en un marcador para más info</div>
  <div id="legend">
    <h4>Referencias</h4>
    <div class="legend-item">
      <div class="legend-line"></div>
      Traslado en autobús
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#C9A84C"></div>
      Punto de interés
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#C0392B"></div>
      Ciudad principal
    </div>
  </div>
</div>

<script>
const CITIES = [
  {
    id: 'montreal',
    name: 'Montréal',
    days: [1,2,3],
    dates: '31 May – 02 Jun',
    color: '#4A90D9',
    coords: [45.5017, -73.5673],
    spots: [
      { name: 'Vieux-Port & Vieux-Montréal', coords: [45.5025, -73.5523] },
      { name: 'Basílica Notre-Dame', coords: [45.5045, -73.5567] },
      { name: 'Mercado Jean-Talon', coords: [45.5300, -73.6147] },
      { name: 'Boulevard St-Laurent & Schwartz Deli', coords: [45.5185, -73.5985] },
      { name: 'Barrio Plateau Mont-Royal', coords: [45.5260, -73.5774] },
      { name: 'Parque Lafontaine', coords: [45.5283, -73.5716] },
      { name: 'Mont-Royal (mirador)', coords: [45.5044, -73.5870] },
      { name: 'Museo Arqueología Pointe-à-Callières', coords: [45.5025, -73.5540], optional: true },
      { name: 'Museo de Bellas Artes (MBAM)', coords: [45.4987, -73.5785], optional: true },
    ]
  },
  {
    id: 'quebec',
    name: 'Québec City',
    days: [3,4],
    dates: '02 – 03 Jun · 252 km',
    color: '#E67E22',
    coords: [46.8139, -71.2080],
    transfer: { from: 'Montréal', km: 252 },
    spots: [
      { name: 'Castillo Frontenac', coords: [46.8122, -71.2047] },
      { name: 'Barrio Petit Champlain', coords: [46.8108, -71.2040] },
      { name: 'Terraza Dufferin', coords: [46.8117, -71.2055] },
      { name: 'Plaza Real', coords: [46.8099, -71.2027] },
      { name: 'Parlamento de Québec', coords: [46.8075, -71.2140] },
      { name: 'Planicies de Abraham', coords: [46.8001, -71.2187], optional: true },
      { name: 'Costa de Beaupré (cascada Montmorency)', coords: [46.8889, -71.1427], optional: true },
      { name: 'Observación ballenas – Charlevoix', coords: [47.4667, -70.7500], optional: true },
    ]
  },
  {
    id: 'tremblant',
    name: 'Mont-Tremblant',
    days: [5],
    dates: '04 Jun · 375 km',
    color: '#27AE60',
    coords: [46.1185, -74.5962],
    transfer: { from: 'Québec', km: 375 },
    spots: [
      { name: 'Sentier des Cimes (torre panorámica 40m)', coords: [46.2170, -74.6050] },
      { name: 'Pueblo peatonal de Tremblant', coords: [46.1185, -74.5962] },
      { name: 'Lago Tremblant', coords: [46.1250, -74.6050], optional: true },
    ]
  },
  {
    id: 'ottawa',
    name: 'Ottawa',
    days: [6],
    dates: '05 Jun · 164 km',
    color: '#8E44AD',
    coords: [45.4215, -75.6972],
    transfer: { from: 'Mont-Tremblant', km: 164 },
    spots: [
      { name: 'Parlamento Canadiense', coords: [45.4236, -75.7009] },
      { name: 'Canal Rideau', coords: [45.4215, -75.6892] },
      { name: 'Mercado By', coords: [45.4278, -75.6898] },
      { name: 'Parque Omega (fauna canadiense)', coords: [45.8833, -75.7833] },
      { name: 'Sussex Drive (residencia PM)', coords: [45.4430, -75.6960] },
    ]
  },
  {
    id: 'milislas',
    name: 'Mil Islas',
    days: [7],
    dates: '06 Jun · en ruta',
    color: '#16A085',
    coords: [44.3295, -76.1592],
    transfer: { from: 'Ottawa', km: 403, note: 'hacia Toronto' },
    spots: [
      { name: 'Crucero 1h por las 1700 islas', coords: [44.3295, -76.1592] },
      { name: 'Río San Lorenzo', coords: [44.2800, -76.3000] },
    ]
  },
  {
    id: 'toronto',
    name: 'Toronto',
    days: [7,8,9],
    dates: '06 – 08 Jun',
    color: '#C0392B',
    coords: [43.6532, -79.3832],
    spots: [
      { name: 'Torre CN', coords: [43.6426, -79.3871] },
      { name: 'Distillery District', coords: [43.6503, -79.3596] },
      { name: 'Old & New City Hall', coords: [43.6529, -79.3791] },
      { name: 'Mercado San Lorenzo', coords: [43.6487, -79.3710] },
      { name: 'Universidad de Toronto', coords: [43.6629, -79.3957] },
      { name: 'Royal Ontario Museum', coords: [43.6677, -79.3948], optional: true },
      { name: 'Hockey Hall of Fame', coords: [43.6476, -79.3775], optional: true },
      { name: 'Eaton Center', coords: [43.6546, -79.3807], optional: true },
    ]
  },
  {
    id: 'niagara',
    name: 'Cataratas del Niágara',
    days: [8],
    dates: '07 Jun · 264 km RT',
    color: '#2980B9',
    coords: [43.0896, -79.0849],
    transfer: { from: 'Toronto', km: 132, note: 'ida y vuelta' },
    spots: [
      { name: 'Cataratas del Niágara (Horseshoe Falls)', coords: [43.0799, -79.0747] },
      { name: 'Barco "Voyage to the Falls"', coords: [43.0840, -79.0790] },
      { name: 'Niagara-on-the-Lake (pueblo victoriano)', coords: [43.2552, -79.0717] },
      { name: 'Château des Charmes (viñedo + degustación)', coords: [43.2319, -79.0553] },
    ]
  },
];

// Bus routes (polylines)
const BUS_ROUTES = [
  { from: [45.5017, -73.5673], to: [46.8139, -71.2080], label: 'MTL → QC · 252 km' },
  { from: [46.8139, -71.2080], to: [46.1185, -74.5962], label: 'QC → Tremblant · 375 km' },
  { from: [46.1185, -74.5962], to: [45.4215, -75.6972], label: 'Tremblant → Ottawa · 164 km' },
  { from: [45.4215, -75.6972], to: [44.3295, -76.1592], label: 'Ottawa → Mil Islas' },
  { from: [44.3295, -76.1592], to: [43.6532, -79.3832], label: 'Mil Islas → Toronto' },
  { from: [43.6532, -79.3832], to: [43.0896, -79.0849], label: 'Toronto → Niágara · 132 km' },
  { from: [43.0896, -79.0849], to: [43.6532, -79.3832], label: 'Niágara → Toronto · 132 km (regreso)' },
];

// MAP INIT
const map = L.map('map', {
  center: [45.0, -74.5],
  zoom: 6,
  zoomControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  maxZoom: 18
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);

// BUS ROUTE LINES
const routeLines = BUS_ROUTES.map(r => {
  return L.polyline([r.from, r.to], {
    color: '#C9A84C',
    weight: 2,
    opacity: 0.6,
    dashArray: '8 10',
  }).addTo(map);
});

// MARKERS
const cityMarkers = {};
const spotMarkers = {};

function createCityIcon(city) {
  return L.divIcon({
    html: `<div style="
      width: 14px; height: 14px;
      background: ${city.color};
      border: 2px solid #0D0F14;
      border-radius: 50%;
      box-shadow: 0 0 0 2px ${city.color}55, 0 2px 8px rgba(0,0,0,0.5);
    "></div>`,
    className: '',
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });
}

function createSpotIcon(color, optional) {
  return L.divIcon({
    html: `<div style="
      width: 8px; height: 8px;
      background: ${optional ? 'transparent' : color};
      border: 1.5px solid ${color};
      border-radius: 50%;
      opacity: ${optional ? 0.7 : 1};
    "></div>`,
    className: '',
    iconSize: [8, 8],
    iconAnchor: [4, 4],
  });
}

CITIES.forEach(city => {
  // City marker
  const marker = L.marker(city.coords, { icon: createCityIcon(city) })
    .addTo(map)
    .bindPopup(`
      <div class="popup-city">${city.name}</div>
      <div class="popup-spots">
        ${city.spots.map(s =>
          `<div class="popup-spot">${s.name}${s.optional ? ' <em style="color:#C9A84C;font-size:9px">(opcional)</em>' : ''}</div>`
        ).join('')}
      </div>
    `, { maxWidth: 240 });

  cityMarkers[city.id] = marker;

  // Label
  L.marker(city.coords, {
    icon: L.divIcon({
      html: `<div style="
        font-family: 'Playfair Display', serif;
        font-size: 11px;
        color: ${city.color};
        white-space: nowrap;
        text-shadow: 0 1px 3px #000, 0 0 8px rgba(0,0,0,0.8);
        margin-left: 10px;
        margin-top: -4px;
        pointer-events: none;
        font-style: italic;
      ">${city.name}</div>`,
      className: '',
      iconSize: [120, 20],
      iconAnchor: [0, 10],
    })
  }).addTo(map);

  // Spot markers
  spotMarkers[city.id] = city.spots.map(spot => {
    return L.marker(spot.coords, { icon: createSpotIcon(city.color, spot.optional) })
      .addTo(map)
      .bindTooltip(spot.name, {
        direction: 'top',
        className: 'leaflet-tooltip-custom',
        offset: [0, -6],
      });
  });
});

// SIDEBAR RENDER
function renderTimeline(filterID) {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  CITIES.forEach((city, idx) => {
    if (filterID !== 'all' && city.id !== filterID) return;

    const block = document.createElement('div');
    block.className = 'city-block';
    block.dataset.id = city.id;

    // Bus transfer badge
    if (city.transfer && filterID === 'all') {
      const bus = document.createElement('div');
      bus.className = 'bus-route';
      bus.innerHTML = `<div class="bus-line"></div><span class="bus-icon">🚌</span><span class="bus-km">${city.transfer.km ? city.transfer.km + ' km' : ''} ${city.transfer.note || ''}</span><div class="bus-line"></div>`;
      tl.appendChild(bus);
    }

    const dayLabel = city.days.length > 1
      ? `Día ${city.days[0]}–${city.days[city.days.length - 1]}`
      : `Día ${city.days[0]}`;

    block.innerHTML = `
      <div class="city-header">
        <div class="day-badge" style="background:${city.color}">
          ${city.days[0]}<span>DÍA</span>
        </div>
        <div class="city-info">
          <div class="city-name">${city.name}</div>
          <div class="city-date">${city.dates}</div>
        </div>
      </div>
      <div class="spots-list">
        ${city.spots.map(s => `
          <div class="spot-item ${s.optional ? 'optional' : ''}" data-lat="${s.coords[0]}" data-lng="${s.coords[1]}">
            <div class="spot-dot" style="background:${s.optional ? 'transparent' : city.color}; border: 1.5px solid ${city.color}"></div>
            ${s.name}
          </div>
        `).join('')}
      </div>
      ${idx < CITIES.length - 1 ? '<div class="divider"></div>' : ''}
    `;

    // Click city header → fly to city
    block.querySelector('.city-header').addEventListener('click', () => {
      map.flyTo(city.coords, 12, { duration: 1.2 });
      cityMarkers[city.id].openPopup();
      document.querySelectorAll('.city-block').forEach(b => b.classList.remove('active'));
      block.classList.add('active');
    });

    // Click spot → fly to spot
    block.querySelectorAll('.spot-item').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const lat = parseFloat(el.dataset.lat);
        const lng = parseFloat(el.dataset.lng);
        map.flyTo([lat, lng], 14, { duration: 1 });
      });
    });

    tl.appendChild(block);
  });
}

function filterCity(id) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  renderTimeline(id);

  if (id === 'all') {
    map.flyTo([45.0, -74.5], 6, { duration: 1.2 });
    // Show all markers
    Object.keys(cityMarkers).forEach(k => {
      cityMarkers[k].addTo(map);
      spotMarkers[k].forEach(m => m.addTo(map));
    });
    routeLines.forEach(l => l.addTo(map));
  } else {
    const city = CITIES.find(c => c.id === id);
    if (city) {
      map.flyTo(city.coords, 12, { duration: 1.2 });
    }
    // Dim other markers
    Object.keys(cityMarkers).forEach(k => {
      if (k !== id) {
        map.removeLayer(cityMarkers[k]);
        spotMarkers[k].forEach(m => map.removeLayer(m));
      } else {
        cityMarkers[k].addTo(map);
        spotMarkers[k].forEach(m => m.addTo(map));
      }
    });
    routeLines.forEach(l => map.removeLayer(l));
  }
}

renderTimeline('all');

// Tooltip hint
setTimeout(() => {
  const tip = document.getElementById('tooltip');
  tip.classList.add('show');
  setTimeout(() => tip.classList.remove('show'), 3000);
}, 1000);
</script>
